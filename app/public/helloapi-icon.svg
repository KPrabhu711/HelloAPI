<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HelloAPI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>

  <!-- Antenna -->
  <line x1="24" y1="8" x2="24" y2="13.5" stroke="#c7d2fe" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="24" cy="6" r="2.2" fill="#e0e7ff"/>

  <!-- Head body -->
  <rect x="10" y="14" width="28" height="20" rx="5" fill="rgba(255,255,255,0.08)" stroke="#c7d2fe" stroke-width="1.4"/>

  <!-- Left eye (API endpoint) -->
  <circle cx="18.5" cy="21.5" r="3.4" fill="rgba(224,231,255,0.14)" stroke="#dde1ff" stroke-width="1.2"/>
  <circle cx="18.5" cy="21.5" r="1.4" fill="#ffffff"/>

  <!-- Right eye (API endpoint) -->
  <circle cx="29.5" cy="21.5" r="3.4" fill="rgba(224,231,255,0.14)" stroke="#dde1ff" stroke-width="1.2"/>
  <circle cx="29.5" cy="21.5" r="1.4" fill="#ffffff"/>

  <!-- Eye connection (API link) -->
  <line x1="21.9" y1="21.5" x2="26.1" y2="21.5" stroke="#a5b4fc" stroke-width="0.9" stroke-dasharray="1.5 1"/>

  <!-- Mouth: endpoint arrow → -->
  <line x1="16" y1="30" x2="27.2" y2="30" stroke="#a5b4fc" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M24.5 27.5L28 30L24.5 32.5" fill="none" stroke="#a5b4fc" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left side port -->
  <line x1="5.5" y1="21.5" x2="10" y2="21.5" stroke="#818cf8" stroke-width="1" stroke-dasharray="2 1.5"/>
  <circle cx="5" cy="21.5" r="1.6" fill="#818cf8" opacity="0.75"/>

  <!-- Right side port -->
  <line x1="38" y1="21.5" x2="42.5" y2="21.5" stroke="#818cf8" stroke-width="1" stroke-dasharray="2 1.5"/>
  <circle cx="43" cy="21.5" r="1.6" fill="#818cf8" opacity="0.75"/>

  <!-- Bottom connector -->
  <line x1="24" y1="34" x2="24" y2="40" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="40" x2="17" y2="44.5" stroke="#818cf8" stroke-width="1" stroke-linecap="round" opacity="0.65"/>
  <line x1="24" y1="40" x2="31" y2="44.5" stroke="#818cf8" stroke-width="1" stroke-linecap="round" opacity="0.65"/>
  <circle cx="24" cy="40.5" r="1.6" fill="#a5b4fc"/>
  <circle cx="17" cy="44.5" r="1.4" fill="#818cf8" opacity="0.55"/>
  <circle cx="31" cy="44.5" r="1.4" fill="#818cf8" opacity="0.55"/>
</svg>
